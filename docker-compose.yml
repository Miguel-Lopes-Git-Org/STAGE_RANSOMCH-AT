services:
  ransomchat-api:
    build:
      context: .
    image: ransomchat-api:latest
    container_name: ransomchat-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-1010}:8000"
    environment:
      API_KEY: ${API_KEY:?API_KEY is required}
      URL_CHAT_INDEX: ${URL_CHAT_INDEX:?URL_CHAT_INDEX is required}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
